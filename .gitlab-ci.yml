stages:
  - analysis
  - mirror

variables:
  GIT_SUBMODULE_STRATEGY: recursive

sonarqube:
  stage: analysis
  image: mcr.microsoft.com/dotnet/sdk:10.0
  rules:
    - if: $CI_COMMIT_BRANCH
  before_script:
    - apt-get update && apt-get install -y unzip
    - curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
    - mkdir -p /tmp/dalamud && unzip -o /tmp/dalamud.zip -d /tmp/dalamud
    - export DALAMUD_HOME=/tmp/dalamud
  script:
    - cp Echokraut/Services/DriveAuthProvider.Secrets.cs.example Echokraut/Services/DriveAuthProvider.Secrets.cs
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:$HOME/.dotnet/tools"
    - dotnet sonarscanner begin /key:"$SONAR_PROJECT_KEY" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.token="$SONAR_TOKEN" /d:sonar.exclusions="OtterGui/**,KamiToolKit/**,Echotools/**,EchokrautLocalInstaller/**"
    - dotnet build
    - dotnet test --no-build || true
    - dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

mirror-to-github:
  stage: mirror
  image: alpine/git:latest
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - git clone --mirror "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    # Target path is hardcoded — the GitHub repo lives under RenNagasaki, but ${GITHUB_USER}
    # is the CI auth identity and may differ. Using ${GITHUB_USER} on both sides routed the
    # push to the wrong repo and triggered 403s.
    - git remote add github "https://${GITHUB_USER}:${GITHUB_PAT}@github.com/RenNagasaki/Echokraut.git"
    # Additive mirror — push branches and tags without deleting GitHub-only refs.
    # `git push --mirror` would delete tags/branches present on GitHub but missing
    # on GitLab; that wipes the tag a GitHub Release is anchored to, and the
    # Release breaks. Tags created via the GitHub Release UI live ONLY on GitHub
    # until something pushes them back to GitLab, so the destructive variant ate
    # at least one release before this change. `--all --force` covers branches
    # (force-update on rewrites is fine), `--tags` is intentionally non-force so
    # an existing GitHub tag is never overwritten — if a tag's content drifts it
    # has to be resolved manually rather than silently rewritten.
    - git push github --all --force
    - git push github --tags
